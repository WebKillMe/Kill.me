<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<title>VudúReal</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#0D0611"/>
<link rel="apple-touch-icon" href="icons/icon-180.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0D0611;--bg2:#140A17;--panel:#1A0F1F;--panel2:#221430;--panel3:#2C1B36;
  --wax:#E8C468;--wax2:#F0D080;--blood:#9C2B3A;--blood2:#C23348;
  --bone:#EDE6D8;--smoke:#3D2E47;--smokeL:#6B5670;--smokeLL:#9A8AA0;
  --glow:rgba(232,196,104,.15);--glowB:rgba(156,43,58,.2);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);}
body{
  font-family:-apple-system,system-ui,sans-serif;
  background:radial-gradient(ellipse 120% 60% at 50% -10%,#2C1B36,var(--bg) 65%);
  color:var(--bone);min-height:100vh;max-width:480px;margin:0 auto;
}
.cinzel{font-family:'Cinzel',Georgia,serif;}

/* ── Loading ── */
.page-load{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
.load-logo{font-family:'Cinzel',serif;font-size:28px;font-weight:900;letter-spacing:3px;color:var(--wax);opacity:0;animation:fadeIn .6s .3s forwards;}
.load-logo span{color:var(--blood);}
.spinner{width:28px;height:28px;border:2px solid var(--smoke);border-top-color:var(--wax);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes breathe{0%,100%{transform:scale(1) translateY(0)}50%{transform:scale(1.015) translateY(-3px)}}
@keyframes floatGhost{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-12px) rotate(2deg)}}
@keyframes flamePulse{0%,100%{opacity:.85;transform:scaleY(1) scaleX(1)}50%{opacity:1;transform:scaleY(1.12) scaleX(.95)}}
@keyframes shockFlash{0%,100%{opacity:.9}40%,60%{opacity:1;filter:brightness(1.4)}}
@keyframes ripple{0%{r:0;opacity:.6}100%{r:60;opacity:0}}
@keyframes needleShake{0%,100%{transform:rotate(0deg)}30%{transform:rotate(-2deg)}70%{transform:rotate(2deg)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 var(--glow)}50%{box-shadow:0 0 20px 6px var(--glow)}}

/* ── Auth ── */
.auth-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;animation:slideUp .4s ease;}
.auth-brand{text-align:center;margin-bottom:32px;}
.auth-brand h1{font-family:'Cinzel',serif;font-size:34px;font-weight:900;letter-spacing:3px;color:var(--wax);line-height:1;}
.auth-brand h1 span{color:var(--blood2);}
.auth-brand p{color:var(--smokeL);font-size:13px;margin-top:8px;letter-spacing:.5px;}
.auth-doll{display:flex;justify-content:center;margin-bottom:24px;}
.auth-card{width:100%;background:var(--panel);border:1px solid var(--smoke);border-radius:20px;padding:24px;box-shadow:0 8px 40px rgba(0,0,0,.4);}
.auth-tabs{display:flex;border-radius:12px;overflow:hidden;background:var(--bg2);margin-bottom:20px;border:1px solid var(--smoke);}
.auth-tab{flex:1;padding:11px;background:transparent;border:none;color:var(--smokeL);font-weight:700;font-size:13px;cursor:pointer;transition:all .2s;letter-spacing:.3px;}
.auth-tab.on{background:var(--panel3);color:var(--bone);}
.field{margin-bottom:14px;}
.field label{display:block;font-size:10px;color:var(--smokeL);margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.field input{width:100%;background:var(--bg2);border:1px solid var(--smoke);border-radius:12px;color:var(--bone);padding:12px 14px;font-size:15px;font-family:inherit;transition:border-color .2s;outline:none;}
.field input:focus{border-color:var(--wax);}
.auth-err{color:#E8602C;font-size:12px;min-height:16px;margin-bottom:8px;text-align:center;}

/* ── Buttons ── */
.btn{width:100%;border:none;border-radius:14px;padding:14px;font-weight:800;font-size:14px;cursor:pointer;letter-spacing:.5px;transition:all .18s;font-family:inherit;}
.btn-blood{background:linear-gradient(135deg,var(--blood),var(--blood2));color:var(--bone);}
.btn-blood:hover{filter:brightness(1.1);}
.btn-blood:disabled{background:var(--smoke);cursor:default;filter:none;}
.btn-wax{background:linear-gradient(135deg,var(--wax),var(--wax2));color:var(--bg);border-radius:14px;border:none;padding:13px 28px;font-weight:800;font-size:14px;cursor:pointer;letter-spacing:.3px;transition:all .18s;}
.btn-wax:hover{filter:brightness(1.08);}
.btn-ghost{background:transparent;border:1px solid var(--smoke);color:var(--smokeL);border-radius:14px;padding:12px;font-weight:700;font-size:13px;cursor:pointer;width:100%;transition:all .2s;}
.btn-ghost:hover{border-color:var(--smokeL);}

/* ── Layout ── */
.topbar{display:flex;justify-content:space-between;align-items:center;padding:env(safe-area-inset-top,18px) 20px 0;}
.logo{font-family:'Cinzel',serif;font-weight:900;letter-spacing:2px;font-size:15px;color:var(--bone);}
.logo span{color:var(--blood2);}
.topbar-right{display:flex;align-items:center;gap:12px;}
.streak-badge{background:var(--panel2);border:1px solid #3D2E47;border-radius:20px;padding:4px 10px;font-size:12px;font-weight:700;color:var(--wax);display:flex;align-items:center;gap:4px;}
.gear-btn{background:none;border:none;font-size:20px;cursor:pointer;opacity:.7;transition:opacity .2s;}
.gear-btn:hover{opacity:1;}
.screen{padding:20px;padding-bottom:100px;animation:slideUp .3s ease;}
.bottomnav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
  background:rgba(26,15,31,.95);backdrop-filter:blur(12px);border-top:1px solid var(--smoke);
  display:flex;padding:12px 0 calc(14px + env(safe-area-inset-bottom,0px));
}
.navbtn{flex:1;background:none;border:none;color:var(--smokeL);font-weight:700;font-size:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s;letter-spacing:.3px;}
.navbtn .nicon{font-size:20px;transition:transform .2s;}
.navbtn.on{color:var(--wax);}
.navbtn.on .nicon{transform:scale(1.15);}

/* ── Titles ── */
.page-title{font-family:'Cinzel',serif;color:var(--wax);font-size:20px;font-weight:700;text-align:center;letter-spacing:.5px;line-height:1.3;}
.page-sub{color:var(--smokeL);font-size:12px;text-align:center;margin-top:5px;letter-spacing:.2px;}
.divider{width:40px;height:1px;background:var(--smoke);margin:14px auto;}

/* ── Doll ── */
.doll-wrap{position:relative;display:flex;justify-content:center;}
.doll-anim-breathe{animation:breathe 3s ease-in-out infinite;}
.doll-anim-ghost{animation:floatGhost 3s ease-in-out infinite;}
.doll-anim-flame svg ellipse{animation:flamePulse 1.2s ease-in-out infinite;}
.doll-anim-shock{animation:shockFlash 1.5s ease-in-out infinite;}
.doll-anim-shake{animation:needleShake 2s ease-in-out infinite;}

/* ── Death cards ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;}
.death-card{
  background:var(--panel);border:1px solid var(--smoke);border-radius:18px;padding:16px 8px;
  display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;
  transition:all .2s;position:relative;overflow:hidden;
}
.death-card::before{content:'';position:absolute;inset:0;background:var(--glow);opacity:0;transition:opacity .2s;}
.death-card.on:hover::before{opacity:1;}
.death-card.on{border-color:var(--wax);box-shadow:0 0 12px var(--glow);}
.death-card.off{opacity:.38;cursor:default;}
.death-card .dlabel{color:var(--bone);font-size:12px;font-weight:700;letter-spacing:.3px;}
.death-card .dreq{color:var(--smokeL);font-size:10px;}
.draw-card{
  grid-column:span 2;background:var(--panel);border:1px dashed var(--wax);border-radius:18px;
  padding:16px;display:flex;align-items:center;justify-content:center;gap:12px;cursor:pointer;transition:all .2s;
}
.draw-card:hover{background:var(--panel2);}
.draw-card .dlabel{color:var(--wax);font-size:14px;font-weight:700;}

/* ── Feed ── */
.feed-card{background:var(--panel);border-radius:20px;padding:16px;margin-bottom:12px;border:1px solid var(--smoke);animation:slideUp .3s ease;}
.feed-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:rgba(0,0,0,.6);}
.feed-name{color:var(--bone);font-weight:700;font-size:14px;}
.feed-time{color:var(--smokeL);font-size:11px;}
.feed-razon{color:var(--bone);font-size:14px;margin:4px 0 6px;line-height:1.5;font-style:italic;}
.feed-razon::before{content:'"';color:var(--wax);font-size:18px;font-family:'Cinzel',serif;vertical-align:-2px;}
.feed-razon::after{content:'"';color:var(--wax);font-size:18px;font-family:'Cinzel',serif;vertical-align:-2px;}
.feed-castigo{display:inline-block;background:var(--panel2);border-radius:8px;padding:3px 10px;font-size:11px;font-weight:700;color:var(--wax);margin-bottom:12px;letter-spacing:.3px;}
.dep-btn{
  width:100%;border-radius:12px;padding:11px;color:var(--bone);font-weight:700;font-size:13px;
  border:1px solid var(--blood);background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s;letter-spacing:.3px;
}
.dep-btn.given{background:var(--blood);border-color:var(--blood2);}
.dep-btn:not(.given):hover{background:var(--glowB);}
.dep-count{color:var(--wax);font-weight:900;}
.own-dep{text-align:center;color:var(--smokeL);font-size:12px;padding:8px;}

/* ── Canvas ── */
canvas{background:var(--panel2);border-radius:18px;border:1px solid var(--smoke);touch-action:none;display:block;margin:0 auto;}
.swatches{display:flex;justify-content:center;gap:10px;margin-top:12px;}
.swatch{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer;padding:0;transition:transform .15s;}
.swatch.on{border-color:var(--bone);transform:scale(1.2);}
.widths{display:flex;justify-content:center;gap:10px;margin-top:10px;align-items:center;}
.wbtn{width:34px;height:34px;border-radius:50%;border:1px solid var(--smoke);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.wbtn.on{border-color:var(--wax);background:var(--panel2);}
.wdot{border-radius:50%;background:var(--bone);}
.clearbtn{background:none;border:1px solid var(--smoke);border-radius:8px;color:var(--smokeL);font-size:11px;padding:6px 12px;cursor:pointer;transition:all .2s;}
.clearbtn:hover{border-color:var(--smokeL);}

/* ── Settings ── */
.colorpick{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-top:20px;}
.ccircle{width:38px;height:38px;border-radius:50%;border:3px solid transparent;cursor:pointer;padding:0;transition:all .2s;}
.ccircle.on{border-color:var(--wax);transform:scale(1.15);}
.backlink{display:block;margin:16px auto 0;background:none;border:none;color:var(--smokeL);font-size:13px;cursor:pointer;text-align:center;width:100%;transition:color .2s;}
.backlink:hover{color:var(--bone);}

/* ── Posted / Home done ── */
.card-done{background:var(--panel);border:1px solid var(--smoke);border-radius:20px;padding:20px;text-align:center;margin-top:16px;}
.charcount{text-align:right;font-size:11px;color:var(--smokeL);margin-top:4px;}
textarea,input[type=text],input[type=email],input[type=password]{
  width:100%;background:var(--panel);border:1px solid var(--smoke);border-radius:14px;
  color:var(--bone);padding:12px 14px;font-size:15px;font-family:inherit;outline:none;transition:border-color .2s;
}
textarea{min-height:80px;resize:none;}
textarea:focus,input:focus{border-color:var(--wax);}
</style>
</head>
<body>
<div id="root"><div class="page-load"><div class="load-logo">VUDÚ<span>REAL</span></div><div class="spinner"></div></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
// ── Supabase ──────────────────────────────────────────
const {createClient} = supabase;
const sb = createClient(
  'https://vknwuevlvnavkgvtguku.supabase.co',
  'sb_publishable_f7q0PeemTaEwN9XFotSSEA_kA_rqtz7'
);

// ── Constants ─────────────────────────────────────────
const DOLL_COLORS = ["#C24545","#4577C2","#45C27A","#C2A445","#9C45C2","#E8E8E8"];
const LINE_COLORS = ["#E8C468","#C24545","#45C27A","#4577C2","#EDE6D8","#ffffff"];
const LINE_WIDTHS = [2,4,8];
const DEATHS = [
  {id:"fuego",   label:"Quemado",      emoji:"🔥", min:0,  pose:"scared"},
  {id:"agujas",  label:"Acribillado",  emoji:"📌", min:0,  pose:"cowering"},
  {id:"ahogo",   label:"Ahogado",      emoji:"💧", min:3,  pose:"begging"},
  {id:"rayo",    label:"Electrocutado",emoji:"⚡", min:7,  pose:"dramatic"},
  {id:"aplastado",label:"Aplastado",   emoji:"🪨", min:14, pose:"squish"},
  {id:"fantasma",label:"Exorcizado",   emoji:"👻", min:21, pose:"ghost"},
];
const DEATH_LABELS={
  fuego:"Quemado 🔥",agujas:"Acribillado 📌",ahogo:"Ahogado 💧",
  rayo:"Electrocutado ⚡",aplastado:"Aplastado 🪨",fantasma:"Exorcizado 👻",
};

// ── State ─────────────────────────────────────────────
let user=null, profile=null, view="loading", todayPost=null;
let feedData=[], myDeps=new Set(), authTab="login", draftRazon="";

const today=()=>new Date().toISOString().split('T')[0];
const yesterday=()=>new Date(Date.now()-86400000).toISOString().split('T')[0];
const ge=id=>document.getElementById(id);
const timeAgo=ts=>{
  const m=Math.floor((Date.now()-new Date(ts))/60000);
  if(m<1)return'ahora';if(m<60)return`hace ${m}m`;
  const h=Math.floor(m/60);if(h<24)return`hace ${h}h`;return`hace ${Math.floor(h/24)}d`;
};
const initials=name=>(name||'?').slice(0,2).toUpperCase();

// ── Doll Poses ────────────────────────────────────────
function getPose(poseName,w,h){
  const poses={
    idle:{
      body:`M ${w/2} ${h*.3} Q ${w*.46} ${h*.46} ${w/2} ${h*.62}`,
      aL:`M ${w/2} ${h*.38} Q ${w*.3} ${h*.4} ${w*.24} ${h*.52}`,
      aR:`M ${w/2} ${h*.38} Q ${w*.7} ${h*.4} ${w*.76} ${h*.52}`,
      lL:`M ${w/2} ${h*.62} Q ${w*.34} ${h*.78} ${w*.28} ${h*.95}`,
      lR:`M ${w/2} ${h*.62} Q ${w*.66} ${h*.78} ${w*.72} ${h*.95}`,
    },
    scared:{
      body:`M ${w/2} ${h*.3} Q ${w*.46} ${h*.46} ${w/2} ${h*.62}`,
      aL:`M ${w/2} ${h*.38} Q ${w*.26} ${h*.24} ${w*.18} ${h*.1}`,
      aR:`M ${w/2} ${h*.38} Q ${w*.74} ${h*.24} ${w*.82} ${h*.1}`,
      lL:`M ${w/2} ${h*.62} Q ${w*.36} ${h*.76} ${w*.28} ${h*.95}`,
      lR:`M ${w/2} ${h*.62} Q ${w*.64} ${h*.76} ${w*.72} ${h*.95}`,
    },
    cowering:{
      body:`M ${w/2} ${h*.3} Q ${w*.48} ${h*.43} ${w*.5} ${h*.57}`,
      aL:`M ${w/2} ${h*.36} Q ${w*.34} ${h*.28} ${w*.28} ${h*.18}`,
      aR:`M ${w/2} ${h*.36} Q ${w*.66} ${h*.28} ${w*.72} ${h*.18}`,
      lL:`M ${w*.5} ${h*.57} Q ${w*.38} ${h*.7} ${w*.32} ${h*.88}`,
      lR:`M ${w*.5} ${h*.57} Q ${w*.62} ${h*.7} ${w*.68} ${h*.88}`,
    },
    begging:{
      body:`M ${w/2} ${h*.3} Q ${w*.46} ${h*.46} ${w/2} ${h*.62}`,
      aL:`M ${w/2} ${h*.38} Q ${w*.3} ${h*.48} ${w*.16} ${h*.55}`,
      aR:`M ${w/2} ${h*.38} Q ${w*.7} ${h*.48} ${w*.84} ${h*.55}`,
      lL:`M ${w/2} ${h*.62} Q ${w*.34} ${h*.78} ${w*.28} ${h*.95}`,
      lR:`M ${w/2} ${h*.62} Q ${w*.66} ${h*.78} ${w*.72} ${h*.95}`,
    },
    dramatic:{
      body:`M ${w/2} ${h*.3} Q ${w*.46} ${h*.46} ${w/2} ${h*.62}`,
      aL:`M ${w/2} ${h*.38} Q ${w*.65} ${h*.34} ${w*.84} ${h*.3}`,
      aR:`M ${w/2} ${h*.38} Q ${w*.26} ${h*.5} ${w*.1} ${h*.6}`,
      lL:`M ${w/2} ${h*.62} Q ${w*.38} ${h*.76} ${w*.3} ${h*.95}`,
      lR:`M ${w/2} ${h*.62} Q ${w*.64} ${h*.8} ${w*.68} ${h*.95}`,
    },
    squish:{
      body:`M ${w/2} ${h*.3} Q ${w*.46} ${h*.42} ${w/2} ${h*.55}`,
      aL:`M ${w/2} ${h*.36} Q ${w*.22} ${h*.38} ${w*.06} ${h*.42}`,
      aR:`M ${w/2} ${h*.36} Q ${w*.78} ${h*.38} ${w*.94} ${h*.42}`,
      lL:`M ${w*.5} ${h*.55} Q ${w*.32} ${h*.65} ${w*.18} ${h*.72}`,
      lR:`M ${w*.5} ${h*.55} Q ${w*.68} ${h*.65} ${w*.82} ${h*.72}`,
    },
    ghost:{
      body:`M ${w/2} ${h*.3} Q ${w*.44} ${h*.48} ${w/2} ${h*.65}`,
      aL:`M ${w/2} ${h*.38} Q ${w*.28} ${h*.32} ${w*.16} ${h*.22}`,
      aR:`M ${w/2} ${h*.38} Q ${w*.72} ${h*.32} ${w*.84} ${h*.22}`,
      lL:`M ${w/2} ${h*.65} Q ${w*.38} ${h*.8} ${w*.34} ${h*.97}`,
      lR:`M ${w/2} ${h*.65} Q ${w*.62} ${h*.8} ${w*.66} ${h*.97}`,
    },
  };
  return poses[poseName]||poses.idle;
}

function dollSVG(color,death,dead,poseName,sizePx){
  const w=220,h=280,sw=15;
  const pose=getPose(poseName||'idle',w,h);
  const eyeC=color==="#E8E8E8"?"#222":"#140A17";

  const eyes=dead?`
    <line x1="${w*.42}" y1="${h*.135}" x2="${w*.48}" y2="${h*.165}" stroke="${eyeC}" stroke-width="3" stroke-linecap="round"/>
    <line x1="${w*.48}" y1="${h*.135}" x2="${w*.42}" y2="${h*.165}" stroke="${eyeC}" stroke-width="3" stroke-linecap="round"/>
    <line x1="${w*.52}" y1="${h*.135}" x2="${w*.58}" y2="${h*.165}" stroke="${eyeC}" stroke-width="3" stroke-linecap="round"/>
    <line x1="${w*.58}" y1="${h*.135}" x2="${w*.52}" y2="${h*.165}" stroke="${eyeC}" stroke-width="3" stroke-linecap="round"/>
    <path d="M ${w*.44} ${h*.205} Q ${w/2} ${h*.185} ${w*.56} ${h*.205}" stroke="${eyeC}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  `:`
    <circle cx="${w*.45}" cy="${h*.148}" r="3" fill="${eyeC}"/>
    <circle cx="${w*.55}" cy="${h*.148}" r="3" fill="${eyeC}"/>
    <path d="M ${w*.44} ${h*.192} Q ${w/2} ${h*.218} ${w*.56} ${h*.192}" stroke="${eyeC}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  `;

  let fx="";
  if(death==="fuego"){
    fx+=`<defs><radialGradient id="fl" cx="50%" cy="100%" r="80%"><stop offset="0%" stop-color="#FFD86B"/><stop offset="55%" stop-color="#E8602C"/><stop offset="100%" stop-color="#7A1F2B"/></radialGradient></defs>`;
    [[.28,.88,20,42],[.5,.84,16,46],[.72,.88,20,42]].forEach(([x,y,rx,ry])=>{
      fx+=`<ellipse class="fl" cx="${w*x}" cy="${h*y}" rx="${rx}" ry="${ry}" fill="url(#fl)" opacity="0.9"/>`;
    });
  }
  if(death==="agujas"){
    [[.33,.22],[.6,.3],[.43,.47],[.72,.57],[.28,.67],[.55,.78]].forEach(([x,y])=>{
      fx+=`<g class="needle"><line x1="${w*x}" y1="${h*y}" x2="${w*x+24}" y2="${h*y-14}" stroke="#EDE6D8" stroke-width="2.5"/>
      <circle cx="${w*x+24}" cy="${h*y-14}" r="2" fill="#EDE6D8"/></g>`;
    });
  }
  if(death==="ahogo"){
    fx+=`<defs><linearGradient id="water" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3A6FA8" stop-opacity=".5"/><stop offset="100%" stop-color="#1A3F6A" stop-opacity=".7"/></linearGradient></defs>`;
    fx+=`<rect x="0" y="${h*.42}" width="${w}" height="${h*.58}" fill="url(#water)"/>`;
    fx+=`<ellipse cx="${w/2}" cy="${h*.42}" rx="${w*.55}" ry="10" fill="none" stroke="#6AAFE0" stroke-width="2" opacity=".5"/>`;
  }
  if(death==="rayo"){
    fx+=`<defs><filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>`;
    fx+=`<polyline filter="url(#glow)" points="${w*.52},${h*.02} ${w*.38},${h*.3} ${w*.58},${h*.32} ${w*.4},${h*.65}" stroke="#FCEE6B" stroke-width="10" fill="none" stroke-linejoin="round" opacity=".95"/>`;
    fx+=`<polyline points="${w*.52},${h*.02} ${w*.38},${h*.3} ${w*.58},${h*.32} ${w*.4},${h*.65}" stroke="#fff" stroke-width="3" fill="none" stroke-linejoin="round" opacity=".6"/>`;
  }
  if(death==="aplastado"){
    fx+=`<defs><linearGradient id="rock" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7A7A7A"/><stop offset="100%" stop-color="#3A3A3A"/></linearGradient></defs>`;
    fx+=`<ellipse cx="${w/2}" cy="${h*.09}" rx="80" ry="42" fill="url(#rock)"/>`;
    fx+=`<ellipse cx="${w/2}" cy="${h*.09}" rx="80" ry="42" fill="none" stroke="#555" stroke-width="1.5"/>`;
    [[-.3,-.1],[.2,.05],[-.1,.15]].forEach(([dx,dy])=>{
      fx+=`<line x1="${w/2+dx*w}" y1="${h*.12+dy*h}" x2="${w/2+dx*w+20}" y2="${h*.18+dy*h}" stroke="#555" stroke-width="1" opacity=".5"/>`;
    });
  }
  if(death==="fantasma"){
    fx+=`<text x="${w*.55}" y="${h*.08}" font-size="44" opacity=".85">👻</text>`;
    fx+=`<ellipse cx="${w*.62}" cy="${h*.2}" rx="18" ry="8" fill="white" opacity=".06"/>`;
  }

  const anim = poseName==='ghost' ? 'class="doll-anim-ghost"' : '';
  const px=sizePx||120;
  const wh=`width="${px}" height="${Math.round(px*280/220)}"`;
  return `<div class="doll-wrap" ${anim} style="width:${px}px;height:${Math.round(px*280/220)}px;position:relative;">
  <svg viewBox="0 0 ${w} ${h}" ${wh} xmlns="http://www.w3.org/2000/svg" style="overflow:visible;display:block;">
    ${fx}
    <g stroke="${color}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <circle cx="${w/2}" cy="${h*.16}" r="${w*.155}" fill="${color}" stroke="none"/>
      <path d="${pose.body}"/>
      <path d="${pose.aL}"/>
      <path d="${pose.aR}"/>
      <path d="${pose.lL}"/>
      <path d="${pose.lR}"/>
    </g>
    ${eyes}
  </svg>
  </div>`;
}

function dollWithDrawing(color,death,strokes,dead,poseName,sizePx){
  if(death!=="dibujo") return dollSVG(color,death,dead,poseName,sizePx);
  const px=sizePx||120;
  const ht=Math.round(px*280/220);
  const polys=(strokes||[]).map(s=>{
    const pts=s.puntos.map(p=>`${p.x},${p.y}`).join(" ");
    return `<polyline points="${pts}" stroke="${s.color}" stroke-width="${s.grosor}" stroke-linecap="round" stroke-linejoin="round" fill="none"/>`;
  }).join("");
  return `<div class="doll-wrap" style="width:${px}px;height:${ht}px;position:relative;">
    ${dollSVG(color,null,dead,'idle',px)}
    <svg viewBox="0 0 220 280" width="${px}" height="${ht}" style="position:absolute;top:0;left:0;">${polys}</svg>
  </div>`;
}

// ── Data ─────────────────────────────────────────────
async function loadProfile(){
  const {data}=await sb.from('profiles').select('*').eq('id',user.id).maybeSingle();
  profile=data;
}
async function loadTodayPost(){
  const {data}=await sb.from('posts').select('*').eq('user_id',user.id).eq('post_date',today()).maybeSingle();
  todayPost=data;
}
async function loadFeed(){
  const {data:posts}=await sb.from('posts').select('*').eq('post_date',today()).order('created_at',{ascending:false});
  feedData=posts||[];
  const {data:deps}=await sb.from('deps').select('post_id').eq('user_id',user.id);
  myDeps=new Set((deps||[]).map(d=>d.post_id));
}
async function submitPost(pd){
  const t=today(),y=yesterday();
  const newStreak=(profile.last_post_date===y)?(profile.streak||0)+1:1;
  const {data,error}=await sb.from('posts').insert({
    user_id:user.id,username:profile.username,razon:pd.razon,castigo:pd.castigo,
    dibujo_trazos:pd.dibujo?.trazos||null,dibujo_descripcion:pd.dibujo?.descripcion||null,
    doll_color:profile.doll_color,post_date:t,
  }).select().single();
  if(error){alert('Error: '+error.message);return;}
  await sb.from('profiles').update({streak:newStreak,last_post_date:t}).eq('id',user.id);
  profile.streak=newStreak;profile.last_post_date=t;
  todayPost=data;view='posted';paint();
}
async function toggleDep(pid){
  if(myDeps.has(pid)){
    await sb.from('deps').delete().eq('post_id',pid).eq('user_id',user.id);
    myDeps.delete(pid);
    const p=feedData.find(x=>x.id===pid);if(p)p.dep_count=Math.max(0,(p.dep_count||0)-1);
  }else{
    await sb.from('deps').insert({post_id:pid,user_id:user.id});
    myDeps.add(pid);
    const p=feedData.find(x=>x.id===pid);if(p)p.dep_count=(p.dep_count||0)+1;
  }
  paint();
}

async function doSignUp(email,pass,uname){
  const {data:ex}=await sb.from('profiles').select('id').eq('username',uname).maybeSingle();
  if(ex)return'Ese nombre ya está en uso';
  const {error}=await sb.auth.signUp({email,password:pass,options:{data:{username:uname}}});
  if(error)return error.message;
  return null;
}
async function doSignIn(email,pass){
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error)return error.message;
  return null;
}

function checkDraw(){

  const has=window.__strokes&&window.__strokes.length>0;
  const b=ge('guardarDibujo');if(b)b.disabled=!(r&&d&&has);

function setupCanvas(){
  const cv=ge('drawCanvas');if(!cv)return;
  const ctx=cv.getContext('2d');
  let drawing=false,curC=LINE_COLORS[0],curW=LINE_WIDTHS[1],cur=null;
  window.__strokes=[];

  function guide(){
    ctx.clearRect(0,0,220,280);
    ctx.save();ctx.globalAlpha=.35;ctx.strokeStyle=profile.doll_color;ctx.fillStyle=profile.doll_color;
    ctx.lineWidth=13;ctx.lineCap='round';ctx.lineJoin='round';
    const w=220,h=280,pose=getPose('idle',w,h);
    ctx.beginPath();ctx.arc(w/2,h*.16,w*.155,0,Math.PI*2);ctx.fill();
    ctx.beginPath();
    [pose.body,pose.aL,pose.aR,pose.lL,pose.lR].forEach(p=>{
      const m=p.match(/M ([0-9.]+) ([0-9.]+)/);
      const q=p.match(/Q ([0-9.]+) ([0-9.]+) ([0-9.]+) ([0-9.]+)/);
      if(m&&q){ctx.moveTo(+m[1],+m[2]);ctx.quadraticCurveTo(+q[1],+q[2],+q[3],+q[4]);}
    });
    ctx.stroke();ctx.restore();
  }

  function redraw(){
    guide();
    window.__strokes.forEach(s=>{
      ctx.strokeStyle=s.color;ctx.lineWidth=s.grosor;ctx.lineCap='round';ctx.lineJoin='round';
      ctx.beginPath();s.puntos.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.stroke();
    });
  }

  function pos(e){
    const r=cv.getBoundingClientRect(),t=e.touches?e.touches[0]:e;
    return{x:(t.clientX-r.left)*(cv.width/r.width),y:(t.clientY-r.top)*(cv.height/r.height)};
  }

  cv.addEventListener('mousedown',e=>{e.preventDefault();drawing=true;cur={puntos:[pos(e)],color:curC,grosor:curW};});
  cv.addEventListener('mousemove',e=>{
    if(!drawing)return;e.preventDefault();
    const p=pos(e);cur.puntos.push(p);const pts=cur.puntos;
    ctx.strokeStyle=curC;ctx.lineWidth=curW;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(pts[pts.length-2].x,pts[pts.length-2].y);ctx.lineTo(pts[pts.length-1].x,pts[pts.length-1].y);ctx.stroke();
  });
  const end=()=>{if(drawing&&cur){window.__strokes.push(cur);cur=null;checkDraw();}drawing=false;};
  cv.addEventListener('mouseup',end);cv.addEventListener('mouseleave',end);
  cv.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;cur={puntos:[pos(e)],color:curC,grosor:curW};},{passive:false});
  cv.addEventListener('touchmove',e=>{
    if(!drawing)return;e.preventDefault();
    const p=pos(e);cur.puntos.push(p);const pts=cur.puntos;
    ctx.strokeStyle=curC;ctx.lineWidth=curW;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(pts[pts.length-2].x,pts[pts.length-2].y);ctx.lineTo(pts[pts.length-1].x,pts[pts.length-1].y);ctx.stroke();
  },{passive:false});
  cv.addEventListener('touchend',end);

  document.querySelectorAll('.swatch').forEach(s=>{
    s.onclick=()=>{curC=s.getAttribute('data-color');document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('on'));s.classList.add('on');};
  });
  document.querySelectorAll('.wbtn').forEach(b=>{
    b.onclick=()=>{curW=parseInt(b.getAttribute('data-width'));document.querySelectorAll('.wbtn').forEach(x=>x.classList.remove('on'));b.classList.add('on');};
  });
  ge('clearCanvas').onclick=()=>{window.__strokes=[];redraw();checkDraw();};
  ge('guardarDibujo').onclick=async()=>{
    const r=ge('razonDibujo').value.trim(),d=ge('descDibujo').value.trim();
    const btn=ge('guardarDibujo');btn.disabled=true;btn.textContent='...';
    await submitPost({razon:r,castigo:'dibujo',dibujo:{trazos:window.__strokes,descripcion:d}});
  };
  guide();
}

// ── Init ──────────────────────────────────────────────
async function init(){
  sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN'&&session?.user){
      user=session.user;
      await loadProfile();
      if(!profile){
        const uname=user.user_metadata?.username||user.email.split('@')[0];
        await sb.from('profiles').upsert({id:user.id,username:uname});
        await loadProfile();
      }
      await loadTodayPost();
      view='home';paint();
    }else if(event==='SIGNED_OUT'){
      user=null;profile=null;todayPost=null;view='auth';paint();
    }
  });

  const {data:{session}}=await sb.auth.getSession();
  if(session?.user){
    user=session.user;
    await loadProfile();
    if(!profile){
      const uname=user.user_metadata?.username||user.email.split('@')[0];
      await sb.from('profiles').upsert({id:user.id,username:uname});
      await loadProfile();
    }
    await loadTodayPost();
    view='home';
  }else{
    view='auth';
  }
  paint();
}

if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
init();
</script>
